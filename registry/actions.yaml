# Capability Registry - Actions v1.0
# All supported actions that Plan IR can reference
# Based on fsq-mac CLI v0.3.0

schema_version: "1.0"

supported_contract_actions:
  - app.activate
  - app.launch
  - app.terminate
  - assert.app-frontmost
  - assert.app-running
  - assert.enabled
  - assert.text
  - assert.value
  - assert.visible
  - capture.screenshot
  - capture.ui-tree
  - element.click
  - element.double-click
  - element.drag
  - element.find
  - element.hover
  - element.inspect
  - element.right-click
  - element.scroll
  - element.type
  - input.click-at
  - input.hotkey
  - input.key
  - input.text
  - menu.click
  - session.end
  - session.start
  - wait.app
  - wait.element
  - wait.window
  - window.focus

actions:
  # ============================================================
  # SESSION MANAGEMENT
  # ============================================================
  session_start:
    description: Start a new fsq-mac automation session
    args: {}
    compile_to: mac session start
    expected_evidence: [session_id]
    default_retry: {max_attempts: 3, backoff: exponential}
    danger_level: safe
    tags: [session, lifecycle]

  session_end:
    description: End the current fsq-mac session
    args: {}
    compile_to: mac session end
    expected_evidence: [command_output]
    default_retry: {max_attempts: 1, backoff: none}
    danger_level: safe
    tags: [session, lifecycle]

  # ============================================================
  # APPLICATION CONTROL
  # ============================================================
  activate_app:
    description: Activate/focus an application
    args:
      bundle_id: {type: string, required: true, description: "App bundle identifier"}
    compile_to: mac app activate {bundle_id}
    expected_evidence: [process_running]
    preconditions: [session_active]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [app, focus]

  launch_app:
    description: Launch an application
    args:
      bundle_id: {type: string, required: true, description: "App bundle identifier"}
    compile_to: mac app launch {bundle_id}
    expected_evidence: [process_running, command_output]
    default_retry: {max_attempts: 3, backoff: exponential}
    danger_level: safe
    tags: [app, launch]

  terminate_app:
    description: Terminate an application
    args:
      bundle_id: {type: string, required: true}
    compile_to: mac app terminate {bundle_id} --allow-dangerous
    expected_evidence: [command_output]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: dangerous
    repair_hints: ["Check if app has unsaved data"]
    tags: [app, terminate]

  # ============================================================
  # ELEMENT OPERATIONS (v0.3.0 flag-based locators)
  # ============================================================
  element_click:
    description: Click an element by locator flags
    args:
      ref: {type: string, required: false, description: "Element ref e.g. e0"}
      role: {type: string, required: false, description: "AX role e.g. AXButton"}
      name: {type: string, required: false, description: "Accessibility name"}
      label: {type: string, required: false, description: "Accessibility label"}
      id: {type: string, required: false, description: "Accessibility identifier"}
    compile_to: __element_argv__
    expected_evidence: [element_found, command_output]
    preconditions: [session_active, app_focused]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [element, click, interaction]

  element_right_click:
    description: Right-click an element
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
    compile_to: __element_argv__
    expected_evidence: [element_found, command_output]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [element, click, context_menu]

  element_double_click:
    description: Double-click an element
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
    compile_to: __element_argv__
    expected_evidence: [element_found, command_output]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [element, click]

  element_type:
    description: Type text into an element
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
      text: {type: string, required: true}
    compile_to: __element_argv__
    expected_evidence: [element_found, command_output]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [element, type, input]

  element_scroll:
    description: Scroll an element
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
      direction: {type: string, required: true, enum: [up, down, left, right]}
    compile_to: __element_argv__
    expected_evidence: [command_output]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [element, scroll]

  element_hover:
    description: Hover over an element
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
    compile_to: __element_argv__
    expected_evidence: [element_found, command_output]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [element, hover]

  element_find:
    description: Find elements by locator
    args:
      locator: {type: string, required: true, description: "Locator value"}
      first_match: {type: boolean, required: false, default: false}
    compile_to: mac element find {locator}
    expected_evidence: [element_found, command_output]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [element, find, query]

  element_inspect:
    description: Inspect elements in the current view
    args: {}
    compile_to: mac element inspect
    expected_evidence: [element_found, command_output]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [element, inspect, query]

  element_drag:
    description: Drag from source element to target element
    args:
      source: {type: string, required: true, description: "Source element ref e.g. e0"}
      target: {type: string, required: true, description: "Target element ref e.g. e5"}
    compile_to: mac element drag {source} {target}
    expected_evidence: [command_output]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [element, drag]

  # ============================================================
  # DIRECT INPUT (no element targeting)
  # ============================================================
  hotkey:
    description: Send keyboard hotkey
    args:
      combo: {type: string, required: true, description: "Key combination e.g. command+t"}
    compile_to: mac input hotkey {combo}
    expected_evidence: [command_output]
    preconditions: [session_active, app_focused]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [input, keyboard, hotkey]

  type_text:
    description: Type text directly (no element focus)
    args:
      text: {type: string, required: true}
    compile_to: mac input text {text}
    expected_evidence: [command_output]
    preconditions: [session_active]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [input, keyboard, type]

  input_key:
    description: Press a single key
    args:
      key: {type: string, required: true, description: "Key name e.g. Return, Tab, Escape"}
    compile_to: mac input key {key}
    expected_evidence: [command_output]
    preconditions: [session_active]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [input, keyboard, key]

  input_click_at:
    description: Click at absolute screen coordinates
    args:
      x: {type: integer, required: true}
      y: {type: integer, required: true}
    compile_to: mac input click-at {x} {y}
    expected_evidence: [command_output]
    preconditions: [session_active]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [input, mouse, click]

  # ============================================================
  # ASSERTIONS (v0.3.0 flag-based locators)
  # ============================================================
  assert_visible:
    description: Assert element is visible
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
    compile_to: __assert_argv__
    expected_evidence: [assertion_result, element_found]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [assert, visibility]

  assert_enabled:
    description: Assert element is enabled
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
    compile_to: __assert_argv__
    expected_evidence: [assertion_result]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [assert, state]

  assert_text:
    description: Assert element has expected text
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
      expected: {type: string, required: true}
    compile_to: __assert_argv__
    expected_evidence: [assertion_result]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [assert, text, content]

  assert_value:
    description: Assert element has expected value
    args:
      ref: {type: string, required: false}
      role: {type: string, required: false}
      name: {type: string, required: false}
      label: {type: string, required: false}
      id: {type: string, required: false}
      expected: {type: string, required: true}
    compile_to: __assert_argv__
    expected_evidence: [assertion_result]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [assert, value]

  assert_app_running:
    description: Assert an application is running
    args:
      bundle_id: {type: string, required: true}
    compile_to: mac assert app-running {bundle_id}
    expected_evidence: [assertion_result]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [assert, app]

  assert_app_frontmost:
    description: Assert an application is frontmost
    args:
      bundle_id: {type: string, required: true}
    compile_to: mac assert app-frontmost {bundle_id}
    expected_evidence: [assertion_result]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [assert, app]

  # ============================================================
  # CAPTURE / EVIDENCE
  # ============================================================
  capture_screenshot:
    description: Take a screenshot
    args:
      path: {type: string, required: false, default: "./screenshot.png"}
    compile_to: mac capture screenshot {path}
    expected_evidence: [screenshot]
    default_retry: {max_attempts: 2, backoff: none}
    danger_level: safe
    tags: [capture, screenshot, evidence]

  capture_ui_tree:
    description: Capture UI element tree
    args: {}
    compile_to: mac capture ui-tree
    expected_evidence: [ui_tree]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [capture, ui_tree, evidence]

  # ============================================================
  # WAIT / TIMING
  # ============================================================
  wait:
    description: Wait for specified time
    args:
      seconds: {type: number, required: true, description: "Seconds to wait"}
    compile_to: sleep {seconds}
    expected_evidence: []
    default_retry: {max_attempts: 1, backoff: none}
    danger_level: safe
    tags: [wait, timing]

  wait_for_element:
    description: Wait until element appears
    args:
      locator: {type: string, required: true, description: "Locator value for the element"}
      timeout_ms: {type: integer, required: false, default: 10000}
    compile_to: mac wait element {locator} --timeout {timeout_ms}
    expected_evidence: [element_found]
    default_retry: {max_attempts: 1, backoff: none}
    danger_level: safe
    tags: [wait, element]

  wait_window:
    description: Wait for a window to appear
    args:
      title: {type: string, required: true, description: "Window title to wait for"}
      timeout_ms: {type: integer, required: false, default: 10000}
    compile_to: mac wait window {title} --timeout {timeout_ms}
    expected_evidence: [command_output]
    default_retry: {max_attempts: 1, backoff: none}
    danger_level: safe
    tags: [wait, window]

  wait_app:
    description: Wait for an application to launch
    args:
      bundle_id: {type: string, required: true}
      timeout_ms: {type: integer, required: false, default: 10000}
    compile_to: mac wait app {bundle_id} --timeout {timeout_ms}
    expected_evidence: [command_output]
    default_retry: {max_attempts: 1, backoff: none}
    danger_level: safe
    tags: [wait, app]

  # ============================================================
  # MENU OPERATIONS
  # ============================================================
  menu_click:
    description: Click a menu item
    args:
      menu_path: {type: string, required: true, description: "Menu path e.g. 'File > New Tab'"}
    compile_to: mac menu click {menu_path}
    expected_evidence: [command_output]
    preconditions: [session_active, app_focused]
    default_retry: {max_attempts: 2, backoff: linear}
    danger_level: safe
    tags: [menu, click]

  # ============================================================
  # WINDOW MANAGEMENT
  # ============================================================
  window_focus:
    description: Focus a window by index
    args:
      index: {type: integer, required: true, description: "Window index (0 = frontmost)"}
    compile_to: mac window focus {index}
    expected_evidence: [command_output]
    default_retry: {max_attempts: 3, backoff: linear}
    danger_level: safe
    tags: [window, focus]
