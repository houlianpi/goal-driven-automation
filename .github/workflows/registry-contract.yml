name: Registry Contract

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout goal-driven-automation
        uses: actions/checkout@v4

      - name: Checkout fsq-mac contract source
        id: checkout_contract
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: houlianpi/fsq-mac
          path: fsq-mac
          token: ${{ secrets.FSQ_MAC_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: pytest -q

      - name: Validate registry against fsq-mac contract
        if: ${{ hashFiles('fsq-mac/docs/agent-contract.json') != '' }}
        env:
          FSQ_MAC_CONTRACT_PATH: ${{ github.workspace }}/fsq-mac/docs/agent-contract.json
        run: python3 scripts/validate_registry.py

      - name: Skip contract validation when fsq-mac contract is unavailable
        if: ${{ hashFiles('fsq-mac/docs/agent-contract.json') == '' }}
        run: echo "fsq-mac contract checkout unavailable; skipping contract validation. Configure FSQ_MAC_PAT if the repository is private."
